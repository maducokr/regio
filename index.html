<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Regio 로그인</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background-color: #f5f5f5;
            min-height: 100vh;
        }

        .header {
            background: linear-gradient(135deg, #4A90E2, #357ABD);
            padding: 15px 20px;
            display: flex;
            align-items: center;
            position: relative;
        }

        .back-button {
            color: white;
            font-size: 20px;
            cursor: pointer;
            position: absolute;
            left: 20px;
        }

        .logo {
            text-align: center;
            flex: 1;
            color: white;
        }

        .logo h1 {
            font-size: 24px;
            font-weight: bold;
            margin-bottom: 2px;
        }

        .logo p {
            font-size: 14px;
            opacity: 0.9;
        }

        .container {
            background: white;
            padding: 30px 20px;
            min-height: calc(100vh - 80px);
        }

        .login-title {
            text-align: center;
            font-size: 24px;
            font-weight: bold;
            margin-bottom: 30px;
            color: #333;
        }

        .input-group {
            margin-bottom: 20px;
        }

        .input-field {
            width: 100%;
            padding: 15px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 16px;
            background: white;
            margin-bottom: 15px;
        }

        .input-field:focus {
            outline: none;
            border-color: #4A90E2;
        }

        .input-field::placeholder {
            color: #999;
        }

        .login-button {
            width: 100%;
            padding: 15px;
            background-color: #ccc;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: not-allowed;
            margin-bottom: 20px;
        }

        .login-button.active {
            background-color: #4A90E2;
            cursor: pointer;
        }

        .checkbox-group {
            display: flex;
            justify-content: space-between;
            margin-bottom: 30px;
        }

        .checkbox-item {
            display: flex;
            align-items: center;
            font-size: 14px;
            color: #666;
        }

        .checkbox {
            width: 18px;
            height: 18px;
            border: 2px solid #ddd;
            border-radius: 50%;
            margin-right: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }

        .checkbox.checked {
            background-color: #4A90E2;
            border-color: #4A90E2;
        }

        .checkbox.checked::after {
            content: '✓';
            color: white;
            font-size: 12px;
        }

        .biometric-login {
            text-align: center;
            margin-bottom: 30px;
        }

        .fingerprint-icon {
            width: 60px;
            height: 60px;
            background-color: #4A90E2;
            border-radius: 50%;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 24px;
            cursor: pointer;
        }

        .recovery-links {
            text-align: center;
            margin-bottom: 30px;
        }

        .recovery-links a {
            color: #666;
            text-decoration: none;
            font-size: 14px;
            margin: 0 10px;
        }

        .recovery-links a:hover {
            color: #4A90E2;
        }

        .divider {
            display: inline-block;
            width: 1px;
            height: 12px;
            background-color: #ddd;
            margin: 0 5px;
        }

        .membership-prompt {
            text-align: center;
            margin-bottom: 30px;
            position: relative;
        }

        .membership-prompt::before,
        .membership-prompt::after {
            content: '';
            position: absolute;
            top: 50%;
            width: 30%;
            height: 1px;
            background-color: #ddd;
        }

        .membership-prompt::before {
            left: 0;
        }

        .membership-prompt::after {
            right: 0;
        }

        .membership-text {
            background: white;
            padding: 0 15px;
            color: #666;
            font-size: 14px;
        }

        .join-button {
            width: 100%;
            padding: 15px;
            background-color: white;
            color: #333;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .join-button:hover {
            background-color: #f8f9fa;
            border-color: #4A90E2;
        }

        @media (max-width: 480px) {
            .container {
                padding: 20px 15px;
            }
            
            .login-title {
                font-size: 22px;
            }
            
            .checkbox-group {
                flex-direction: column;
                gap: 15px;
            }
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="back-button">←</div>
        <div class="logo">
            <h1>Regio Note</h1>
            <p>Regio</p>
        </div>
    </div>

    <div class="container">
        <h2 class="login-title">로그인</h2>
        
        <div class="input-group">
            <input type="text" class="input-field" placeholder="아이디/닉네임" id="username">
            <input type="password" class="input-field" placeholder="비밀번호/password" id="password">
        </div>

        <button class="login-button" id="loginBtn">로그인</button>

        <div class="checkbox-group">
            <div class="checkbox-item">
                <div class="checkbox checked" id="saveId"></div>
                <span>아이디 저장</span>
            </div>
            <div class="checkbox-item">
                <div class="checkbox checked" id="autoLogin"></div>
                <span>자동 로그인</span>
            </div>
        </div>

        <div class="biometric-login">
            <div class="fingerprint-icon">👆</div>
        </div>

        <div class="recovery-links">
            <a href="#">아이디 찾기</a>
            <span class="divider"></span>
            <a href="#">비밀번호 찾기</a>
            <span class="divider"></span>
            <a href="#">등록 확인</a>
        </div>

        <div class="membership-prompt">
            <span class="membership-text">미등록 인가요?</span>
        </div>

        <button class="join-button">등록신청</button>
    </div>

    <script>
        // 체크박스 토글 기능
        document.querySelectorAll('.checkbox').forEach(checkbox => {
            checkbox.addEventListener('click', function() {
                this.classList.toggle('checked');
            });
        });

        // 로그인 버튼 활성화/비활성화
        const usernameInput = document.getElementById('username');
        const passwordInput = document.getElementById('password');
        const loginBtn = document.getElementById('loginBtn');

        function checkInputs() {
            if (usernameInput.value.trim() && passwordInput.value.trim()) {
                loginBtn.classList.add('active');
                loginBtn.style.cursor = 'pointer';
            } else {
                loginBtn.classList.remove('active');
                loginBtn.style.cursor = 'not-allowed';
            }
        }

        usernameInput.addEventListener('input', checkInputs);
        passwordInput.addEventListener('input', checkInputs);

        // 로그인 버튼 클릭 이벤트
        loginBtn.addEventListener('click', function() {
            if (this.classList.contains('active')) {
                alert('로그인 시도: ' + usernameInput.value);
            }
        });

        // 뒤로가기 버튼
        document.querySelector('.back-button').addEventListener('click', function() {
            alert('뒤로가기');
        });

        // 지문 로그인
        document.querySelector('.fingerprint-icon').addEventListener('click', function() {
            alert('지문 인식 로그인');
        });

        // 회원가입 버튼
        document.querySelector('.join-button').addEventListener('click', function() {
            alert('회원가입 페이지로 이동');
        });
    </script>
</body>
</html>
